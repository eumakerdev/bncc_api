name: CodeQL

# Análise estática de segurança (SAST) do código Python (Princípio V — segurança
# por padrão). Roda em separado do CI de qualidade: não bloqueia merge por padrão
# (os alertas aparecem na aba Security), apenas dá visibilidade contínua de padrões
# inseguros no código. Não toca o runtime nem o build da aplicação.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Varredura semanal (segunda 06:00 UTC) para pegar novas queries/CVEs mesmo
    # sem mudanças no código.
    - cron: "0 6 * * 1"

jobs:
  analyze:
    name: Analyze (python)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"
