name: CI

# Portões bloqueantes exigidos pela Constituição (Princípio III / III-gate):
# suíte verde, cobertura >= 80%, ruff + black limpos e build da imagem Docker.
on:
  push:
    branches: [main, "001-*"]
  pull_request:
    branches: [main]

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dependency vulnerability audit (pip-audit)
        # continue-on-error: a stack de IA (chromadb 0.4.18, langchain 0.1.0 etc.) é antiga e
        # tem CVEs conhecidas em transitivos que exigem upgrade maior e coordenado (fora de escopo
        # agora); o objetivo aqui é dar visibilidade no log do CI, não travar o build.
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
        continue-on-error: true

      - name: Lint (ruff)
        run: ruff check app/ scripts/ tests/

      - name: Format check (black)
        run: black --check app/ scripts/ tests/

      - name: Type check (mypy — código novo)
        run: mypy app/ || true  # bloqueante quando o legado for migrado

      - name: Tests + coverage gate (>= 80%)
        env:
          ENVIRONMENT: development
          SECRET_KEY: ci-test-secret-not-for-production
          DATABASE_URL: "sqlite+aiosqlite:///./data/test_platform.db"
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image (gate)
        run: docker build -t bncc-api:ci .
