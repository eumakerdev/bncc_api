name: CI

# Portões bloqueantes exigidos pela Constituição (Princípio III / III-gate):
# suíte verde, cobertura >= 80%, ruff + black limpos e build da imagem Docker.
on:
  push:
    branches: [main, "001-*"]
  pull_request:
    branches: [main]

jobs:
  quality-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Dependency vulnerability audit (pip-audit)
        # continue-on-error: a stack de IA (chromadb 0.4.18, langchain 0.1.0 etc.) é antiga e
        # tem CVEs conhecidas em transitivos que exigem upgrade maior e coordenado (fora de escopo
        # agora); o objetivo aqui é dar visibilidade no log do CI, não travar o build.
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt
        continue-on-error: true

      - name: Lint (ruff)
        run: ruff check app/ scripts/ tests/

      - name: Format check (black)
        run: black --check app/ scripts/ tests/

      - name: Type check (mypy — código novo, BLOQUEANTE)
        # Gate bloqueante restrito ao "código novo" da plataforma que já passa limpo
        # (Princípio: mypy DEVE passar em código novo). Os módulos abaixo têm strictness
        # (disallow_untyped_defs/check_untyped_defs) configurada em pyproject [tool.mypy].
        # Fora do gate por ora (reportado, não corrigido às cegas):
        #   - app/core/errors.py: 2 erros próprios de [arg-type] em add_exception_handler
        #     (assinatura Starlette exige Exception, não HTTPException/RequestValidationError);
        #   - app/services/usage_service.py: limpo em si, mas arrasta a stack de IA legada
        #     (vector_store → chromadb/transformers) via follow-imports, com erros/crash no
        #     mypy 1.7.1.
        run: >
          mypy
          app/core/security.py
          app/db/
          app/services/account_service.py
          app/services/apikey_service.py
          app/services/email_service.py

      - name: Type check (mypy — legado, informativo)
        run: mypy app/ || true  # não-bloqueante: dá visibilidade da dívida de tipos no legado

      - name: Tests + coverage gate (>= 80%)
        env:
          ENVIRONMENT: development
          SECRET_KEY: ci-test-secret-not-for-production
          DATABASE_URL: "sqlite+aiosqlite:///./data/test_platform.db"
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80

  # Varreduras de segurança (Princípio V). Separadas em job próprio para atribuição
  # clara de falha e execução em paralelo. Nenhuma toca o runtime da aplicação.
  security-scans:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      # Varredura de segredos: roda o MESMO hook do pre-commit (detect-secrets
      # v1.5.0 + a baseline existente) via `pre-commit`, garantindo paridade exata
      # com o gate local — que é contornável com `git commit --no-verify`, mas o do
      # CI não. Passa no estado atual (a baseline reconcilia os achados conhecidos,
      # inclusive fixtures de teste) e só FALHA se um NOVO segredo for introduzido.
      - name: Secret scan (detect-secrets via pre-commit)
        run: |
          python -m pip install --upgrade pip
          pip install pre-commit
          pre-commit run detect-secrets --all-files

      # Revisão de dependências em PRs: falha só quando a MUDANÇA introduz uma
      # dependência com vulnerabilidade alta+ (não penaliza a dívida legada já
      # pinada — só barra piorar). Roda apenas em pull_request.
      - name: Dependency review
        if: github.event_name == 'pull_request'
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Build Docker image (gate)
        run: docker build -t bncc-api:ci .
