{% extends "base.html" %}
{% block title %}Entrar — BNCC API{% endblock %}
{% block content %}
<div class="container section" style="max-width: 30rem;">
  <h1>Entrar</h1>
  <p class="lead">Acesse o portal para gerenciar suas API keys e consumo.</p>

  {% if info %}<div class="notice">{{ info }}</div>{% endif %}
  {% if error %}<div class="notice" style="border-left-color: var(--danger);">{{ error }}</div>{% endif %}

  <form method="post" action="/portal/login" class="card">
    <label for="email">E-mail</label>
    <input id="email" name="email" type="email" autocomplete="email" required>

    <label for="password">Senha</label>
    <input id="password" name="password" type="password" autocomplete="current-password" required>

    <p style="margin-top: 1.25rem;">
      <button class="btn" type="submit">Entrar</button>
    </p>
  </form>

  <p class="muted" style="margin-top: 1rem;">
    Não tem conta? <a href="/portal/signup">Criar conta</a>
  </p>
</div>
{% endblock %}
